<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Partenza Files</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="header-text">
        <h1 id="site-title">The Partenza Files</h1>
        <p id="site-tagline"></p>
      </div>
    </div>
  </header>

  <main>
    <!-- Browse view -->
    <div id="browse-view">
      <div class="controls">
        <div class="search-wrap">
          <input type="text" id="search" placeholder="Search incidents, descriptions, tags..." autocomplete="off">
        </div>
        <div class="filters" id="filters"></div>
        <div class="view-sort-wrap">
          <div class="view-toggle">
            <button class="view-btn active" data-view="list" title="List view">&#9776; List</button>
            <button class="view-btn" data-view="map" title="Map view">&#9679; Map</button>
          </div>
          <select id="sort">
            <option value="newest">Newest first</option>
            <option value="oldest">Oldest first</option>
            <option value="most-entries">Most entries</option>
          </select>
        </div>
      </div>

      <div id="tag-cloud" class="tag-cloud"></div>
      <div id="results-count" class="results-count"></div>

      <!-- List view -->
      <div id="view-list">
        <div id="incidents-grid" class="incidents-grid"></div>
        <div id="standalone-section" style="display:none">
          <div class="standalone-separator">Standalone entries</div>
          <div id="standalone-entries" class="entries-grid"></div>
        </div>
        <div id="empty" class="empty-state" style="display:none">
          <p>No incidents found.</p>
        </div>
      </div>

      <!-- Map view -->
      <div id="view-map" style="display:none">
        <div id="map"></div>
        <p id="map-no-location" class="map-no-location" style="display:none">
          No incidents with locations match the current filters.
        </p>
      </div>
    </div>

    <!-- Incident detail view -->
    <div id="detail-view" style="display:none">
      <div class="detail-back">
        <a href="/" id="back-link" class="back-arrow">&larr; All incidents</a>
      </div>
      <div id="detail-content"></div>
    </div>
  </main>

  <footer>
    <p>The Partenza Files &mdash; a personal archive</p>
  </footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/main.js"></script>
</body>
</html>
